<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aura</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="glass" style="padding: 3rem; width: 100%; max-width: 400px;">
            <div class="logo" style="text-align: center; margin-bottom: 2rem;">AURA</div>
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
            <form>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
                    <input type="email" placeholder="email@example.com" class="glass" style="width: 100%; padding: 0.8rem; color: white;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                    <input type="password" placeholder="••••••••" class="glass" style="width: 100%; padding: 0.8rem; color: white;">
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="window.location.href='index.html'">Login</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
                Don't have an account? <a href="#" style="color: var(--primary);">Sign Up</a>
            </p>
        </div>
    </div>
</body>
</html>
