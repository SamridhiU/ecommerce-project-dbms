<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Aura</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">AURA</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
        </div>
        <div class="nav-actions">
            <a href="login.html"><i class="fas fa-user"></i></a>
            <div class="cart-icon">
                <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <section>
        <h1 class="section-title">Shopping <span>Cart</span></h1>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 3rem;">
            <div id="cart-items" class="glass" style="padding: 2rem;">
                <!-- Items will be loaded here -->
            </div>
            <div class="glass" style="padding: 2rem; height: fit-content; border: 1px solid var(--border); background: var(--bg-light);">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
                    <span color="var(--text-muted)">Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
                    <span color="var(--text-muted)">Shipping</span>
                    <span style="color: var(--accent)">FREE</span>
                </div>
                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem;">
                    <span>Total Amount</span>
                    <span id="total">$0.00</span>
                </div>

                <div class="payment-methods">
                    <h4 style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase;">Select Payment Method</h4>
                    <div class="payment-option active" onclick="selectPayment(this)">
                        <i class="fas fa-mobile-alt"></i>
                        <div>
                            <p style="font-weight: 600;">UPI (PhonePe/Google Pay)</p>
                            <p style="font-size: 0.7rem; color: var(--text-muted);">Instant & Secure</p>
                        </div>
                    </div>
                    <div class="payment-option" onclick="selectPayment(this)">
                        <i class="far fa-credit-card"></i>
                        <div>
                            <p style="font-weight: 600;">Credit / Debit Card</p>
                            <p style="font-size: 0.7rem; color: var(--text-muted);">All major cards supported</p>
                        </div>
                    </div>
                    <div class="payment-option" onclick="selectPayment(this)">
                        <i class="fas fa-university"></i>
                        <div>
                            <p style="font-weight: 600;">Net Banking</p>
                            <p style="font-size: 0.7rem; color: var(--text-muted);">Safe & Trusted</p>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="checkout()">Place Order</button>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateCartCount();
        });

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 3rem;"><i class="fas fa-shopping-bag" style="font-size: 3rem; color: var(--border); margin-bottom: 1rem;"></i><p style="color: var(--text-muted);">Your bag is empty!</p><a href="shop.html" class="btn btn-primary" style="margin-top: 1rem;">Go Shopping</a></div>';
                document.getElementById('subtotal').textContent = `Rs. 0`;
                document.getElementById('total').textContent = `Rs. 0`;
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border);">
                        <img src="${item.image_url}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                        <div style="flex: 1;">
                            <h3>${item.name}</h3>
                            <p style="color: var(--accent);">$${item.price}</p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <button class="btn glass" style="padding: 0.5rem 1rem;" onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="btn glass" style="padding: 0.5rem 1rem;" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                        <button class="btn" style="color: #ef4444;" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').textContent = `Rs. ${Math.round(total * 80)}`;
            document.getElementById('total').textContent = `Rs. ${Math.round(total * 80)}`;
        }

        function updateQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
            }
        }

        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function selectPayment(el) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        async function checkout() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) return alert('Cart is empty!');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            try {
                const response = await fetch('http://localhost:5000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: 1, // Mock user ID
                        total_amount: total,
                        items: cart
                    })
                });

                if (response.ok) {
                    alert('Order placed successfully!');
                    localStorage.removeItem('cart');
                    window.location.href = 'profile.html';
                }
            } catch (err) {
                alert('Checkout failed. Make sure the backend is running!');
            }
        }
    </script>
</body>
</html>
